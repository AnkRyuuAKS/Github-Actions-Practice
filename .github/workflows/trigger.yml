name: Differnent Trigger Style

on: 
  push:
    branches: 
      -"main"
    
  pull_request:
    branches: 
      -"*"
    types:
      - opened
      - synchronize
      - reopened

  workflow_dispatch:

jobs:
  HelloWorld:
     runs-on: ubuntu-latest
     steps:
       - run: echo "Hello Hw are you"
       - run: echo "THis is the second step"
       - run: mkdir newFolder
       - run: cd newFolder
       - run:  |
          echo "Hello from Job 1" > message.txt
          cat message.txt

       - name: upload a file
         uses: actions/upload-artifact@v4
         with:
           name: myfile
           path: message.txt

  making_a_file:
    runs-on: ubuntu-latest
    needs: HelloWorld
    steps:
      - run: | 
          echo "THis is the second job lets see if it uses the same server"
          touch newFile.txt
          echo "THis is the text for the file" | tee newFile.txt
          cat newFile.txt

      - name: using the actions to recive the file from v1
        uses: actions/download-artifact@v4
        with:
          name: myfile

      - name: cheking whether the file is received or not
        run: |
           ls -a
           cat message.txt

  job-3:
      runs-on: ubuntu-24.04
      needs:
        - HelloWorld
        - making_a_file
      steps:
        - run: echo "...to form a directed acyclic graph (DAG)"
